<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to eSewa...</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fff8f0 0%, #fde8d8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.10);
            max-width: 420px;
            width: 90%;
        }
        .esewa-logo {
            font-size: 2rem;
            font-weight: 800;
            color: #60BB46;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        .esewa-logo span { color: #222; }
        h2 { font-size: 1.25rem; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; }
        p  { font-size: 0.9rem; color: #6b7280; margin-bottom: 28px; }

        /* Spinner */
        .spinner {
            width: 48px; height: 48px;
            border: 5px solid #f0f0f0;
            border-top-color: #60BB46;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .notice {
            font-size: 0.78rem;
            color: #9ca3af;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="esewa-logo">e<span>Sewa</span></div>
        <div class="spinner"></div>
        <h2>Redirecting to eSewa…</h2>
        <p>Please wait while we securely redirect you to complete your payment.</p>

        <!-- Auto-submit POST form to eSewa -->
        <form id="esewaForm" method="POST" action="{{ esewa_url }}">
            <input type="hidden" name="amount"              value="{{ amount }}">
            <input type="hidden" name="tax_amount"          value="{{ tax_amount }}">
            <input type="hidden" name="total_amount"        value="{{ total_amount }}">
            <input type="hidden" name="transaction_uuid"    value="{{ transaction_uuid }}">
            <input type="hidden" name="product_code"        value="{{ product_code }}">
            <input type="hidden" name="product_service_charge"  value="0">
            <input type="hidden" name="product_delivery_charge" value="0">
            <input type="hidden" name="success_url"         value="{{ success_url }}">
            <input type="hidden" name="failure_url"         value="{{ failure_url }}">
            <input type="hidden" name="signed_field_names"  value="total_amount,transaction_uuid,product_code">
            <input type="hidden" name="signature"           value="{{ signature }}">
        </form>

        <p class="notice">Do not close or refresh this page.</p>
    </div>

    <script>
        // Auto-submit after brief delay so user sees the loading screen
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('esewaForm').submit();
            }, 800);
        });
    </script>
</body>
</html>
