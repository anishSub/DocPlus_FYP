{% extends 'base/base.html' %}
{% load static %}

{% block title %}Video Consultation{% endblock %}

{% block extra_css %}
<style>
    body { overflow: hidden; }
    header, footer { display: none !important; }

    /* Full-screen layout: Jitsi on left, Chat on right */
    .call-layout {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        z-index: 9999;
        background: #000;
    }

    /* Jitsi takes up remaining space on the left */
    #jitsi-container {
        flex: 1;
        height: 100%;
    }

    /* Chat sidebar on the right */
    .chat-panel {
        width: 320px;
        height: 100%;
        background: #1a1a2e;
        display: flex;
        flex-direction: column;
        border-left: 1px solid #2d2d4a;
        flex-shrink: 0;
    }

    .chat-panel-header {
        padding: 16px;
        background: #16213e;
        border-bottom: 1px solid #2d2d4a;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .chat-panel-header h4 {
        color: #fff;
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .chat-status-dot {
        width: 8px;
        height: 8px;
        background: #10B981;
        border-radius: 50%;
        display: inline-block;
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #2d2d4a; border-radius: 4px; }

    .chat-message { display: flex; flex-direction: column; max-width: 85%; }
    .own-message { align-self: flex-end; align-items: flex-end; }
    .other-message { align-self: flex-start; align-items: flex-start; }

    .message-header {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-bottom: 4px;
        flex-direction: row;
    }

    .own-message .message-header { flex-direction: row-reverse; }

    .sender-name { color: #9ca3af; font-size: 11px; font-weight: 500; }
    .message-time { color: #6b7280; font-size: 10px; }

    .message-content {
        padding: 8px 12px;
        border-radius: 12px;
        font-size: 13px;
        line-height: 1.5;
        word-break: break-word;
    }

    .own-message .message-content {
        background: #0C4D98;
        color: #fff;
        border-bottom-right-radius: 3px;
    }

    .other-message .message-content {
        background: #2d2d4a;
        color: #e5e7eb;
        border-bottom-left-radius: 3px;
    }

    .chat-input-area {
        padding: 12px 16px;
        border-top: 1px solid #2d2d4a;
        display: flex;
        gap: 8px;
        background: #16213e;
        align-items: center;
    }

    .chat-input-area input {
        flex: 1;
        background: #2d2d4a;
        border: 1px solid #3d3d5a;
        border-radius: 20px;
        padding: 8px 14px;
        color: #fff;
        font-size: 13px;
        outline: none;
    }

    .chat-input-area input::placeholder { color: #6b7280; }
    .chat-input-area input:focus { border-color: #0C4D98; }

    .chat-send-btn {
        width: 36px;
        height: 36px;
        background: #0C4D98;
        border: none;
        border-radius: 50%;
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
        flex-shrink: 0;
    }

    .chat-send-btn:hover { background: #0a3d78; }

    .empty-chat {
        text-align: center;
        color: #6b7280;
        font-size: 12px;
        margin-top: 30px;
    }

    .empty-chat i {
        font-size: 28px;
        margin-bottom: 8px;
        display: block;
        color: #2d2d4a;
    }
</style>
{% endblock %}

{% block content %}
<div class="call-layout">
    <!-- Jitsi Video Call (takes most of the space) -->
    <div id="jitsi-container"></div>

    <!-- Live Chat Sidebar -->
    <div class="chat-panel">
        <div class="chat-panel-header">
            <h4><span class="chat-status-dot"></span> Live Chat</h4>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="empty-chat" id="empty-chat-msg">
                <i class="fas fa-comments"></i>
                Messages will appear here
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
            <button class="chat-send-btn" id="send-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<!-- Hidden data for JS to read -->
<div id="call-data"
     data-appointment-id="{{ appointment.id }}"
     data-user-role="{% if request.user == appointment.doctor.user %}doctor{% else %}patient{% endif %}"
     data-user-name="{% if request.user == appointment.doctor.user %}Dr. {{ appointment.doctor.user.first_name }} {{ appointment.doctor.user.last_name }}{% else %}{{ appointment.full_name }}{% endif %}">
</div>
{% endblock %}

{% block extra_js %}
<script src="https://meet.jit.si/external_api.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    // ===== JITSI SETUP =====
    const domain = 'jitsi.riot.im';
    const roomName = 'DocPlusConsultation-ApptID-{{ appointment.id }}';
    const isDoctor = {% if request.user == appointment.doctor.user %}true{% else %}false{% endif %};
    const displayName = isDoctor
        ? 'Dr. {{ appointment.doctor.user.first_name }} {{ appointment.doctor.user.last_name }}'
        : '{{ appointment.full_name }}';
    const returnUrl = isDoctor
        ? "{% url 'doctor_admin_appointments' %}"
        : "{% url 'profile' %}";

    const options = {
        roomName: roomName,
        width: '100%',
        height: '100%',
        parentNode: document.querySelector('#jitsi-container'),
        userInfo: { displayName: displayName },
        configOverwrite: {
            startWithAudioMuted: false,
            startWithVideoMuted: false,
            prejoinPageEnabled: false,
        },
        interfaceConfigOverwrite: {
            SHOW_JITSI_WATERMARK: false,
            SHOW_WATERMARK_FOR_GUESTS: false,
            TOOLBAR_BUTTONS: [
                'microphone', 'camera', 'closedcaptions', 'desktop', 'fullscreen',
                'fodeviceselection', 'hangup', 'profile', 'recording',
                'videoquality', 'filmstrip', 'settings', 'raisehand',
                'tileview', 'download', 'help',
            ],
        }
    };

    const api = new JitsiMeetExternalAPI(domain, options);
    api.addListener('videoConferenceLeft', () => {
        window.location.href = returnUrl;
    });

    // ===== LIVE CHAT SETUP (WebSocket) =====
    const callData = document.getElementById('call-data');
    const appointmentId = callData.dataset.appointmentId;
    const userRole = callData.dataset.userRole;
    const userName = callData.dataset.userName;

    let chatSocket = null;

    function connectChatWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/chat/${appointmentId}/`;

        chatSocket = new WebSocket(wsUrl);

        chatSocket.onopen = () => {
            console.log('✅ Chat WebSocket connected');
            document.querySelector('.chat-status-dot').style.background = '#10B981';
        };

        chatSocket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'chat_history') {
                data.messages.forEach(msg =>
                    addMessage(msg.message, msg.sender_type, msg.sender_name, msg.timestamp)
                );
                scrollToBottom();
            } else if (data.type === 'new_message') {
                addMessage(data.message, data.sender_type, data.sender_name, data.timestamp);
                scrollToBottom();
            }
        };

        chatSocket.onerror = () => {
            document.querySelector('.chat-status-dot').style.background = '#ef4444';
        };

        chatSocket.onclose = () => {
            document.querySelector('.chat-status-dot').style.background = '#f59e0b';
            setTimeout(connectChatWebSocket, 3000);
        };
    }

    function addMessage(message, senderType, senderName, timestamp) {
        const emptyMsg = document.getElementById('empty-chat-msg');
        if (emptyMsg) emptyMsg.remove();

        const isOwn = senderType === userRole;
        const msgDiv = document.createElement('div');
        msgDiv.className = `chat-message ${isOwn ? 'own-message' : 'other-message'}`;
        msgDiv.innerHTML = `
            <div class="message-header">
                <span class="sender-name">${isOwn ? 'You' : escapeHtml(senderName)}</span>
                <span class="message-time">${formatTime(timestamp)}</span>
            </div>
            <div class="message-content">${escapeHtml(message)}</div>
        `;
        document.getElementById('chat-messages').appendChild(msgDiv);
    }

    function sendMessage() {
        const input = document.getElementById('chat-input');
        const message = input.value.trim();
        if (message && chatSocket && chatSocket.readyState === WebSocket.OPEN) {
            chatSocket.send(JSON.stringify({
                message: message,
                sender_type: userRole,
                sender_name: userName
            }));
            input.value = '';
            input.focus();
        }
    }

    function scrollToBottom() {
        const chatMessages = document.getElementById('chat-messages');
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function formatTime(timestamp) {
        const d = new Date(timestamp);
        const h = d.getHours(), m = d.getMinutes();
        return `${h % 12 || 12}:${String(m).padStart(2, '0')} ${h >= 12 ? 'PM' : 'AM'}`;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Event listeners
    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('chat-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    connectChatWebSocket();
});
</script>
{% endblock %}
